# Default values for oblien-domains
# This is a YAML-formatted file.

replicaCount: 3

image:
  repository: oblien/oblien-domains
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3000"
  prometheus.io/path: "/api/metrics"

podSecurityContext:
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  hosts:
    - host: domains.oblien.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: oblien-domains-tls
      hosts:
        - domains.oblien.com

resources:
  limits:
    cpu: 1
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Application configuration
config:
  # OpenSRS configuration
  opensrs:
    apiHost: "https://api.opensrs.net"
  
  # Keycloak configuration
  keycloak:
    url: "https://auth.oblien.com/auth"
    realm: "oblien"
    clientId: "oblien-domains"
  
  # Kafka configuration
  kafka:
    clientId: "oblien-domains"
    groupId: "oblien-domains-group"

# External dependencies
postgresql:
  enabled: true
  auth:
    username: oblien
    database: oblien_domains
  primary:
    persistence:
      size: 10Gi
  metrics:
    enabled: true

redis:
  enabled: true
  auth:
    enabled: true
  architecture: standalone
  master:
    persistence:
      size: 5Gi
  metrics:
    enabled: true

kafka:
  enabled: true
  replicaCount: 3
  persistence:
    size: 10Gi
  zookeeper:
    enabled: true
    persistence:
      size: 5Gi
  metrics:
    kafka:
      enabled: true
    zookeeper:
      enabled: true 